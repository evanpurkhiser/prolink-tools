name: build
on: [push]

jobs:
  init_release:
    name: init-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      - name: Create Sentry release
        continue-on-error: true
        env:
          SENTRY_ORG: evan-purkhiser
          SENTRY_PROJECT: prolink-tools
          SENTRY_AUTH_TOKEN: '${{ secrets.SENTRY_AUTH_TOKEN }}'
        run: |
          RELEASE="$(git describe --always)"
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli releases new "$RELEASE"
          sentry-cli releases set-commits "$RELEASE" --auto

  build:
    name: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            ext: tar.gz
            arch: x64
          - os: ubuntu-24.04-arm
            ext: tar.gz
            arch: arm64
          - os: windows-latest
            ext: exe
            arch: x64
          - os: macos-14
            ext: dmg
            arch: universal
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4

      # Test
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

      # Use the short has for the
      - name: Set dev-build artifact name
        shell: bash
        if: ${{ github.ref == 'refs/heads/main' }}
        run: echo "$(jq -r '.build.artifactName="${name}-dev-'"$(git rev-parse --short HEAD)"'-${os}-${arch}.${ext}"' package.json)" > package.json

      # Build
      - run: pnpm electron-builder install-app-deps
      - run: pnpm build-main
      - run: pnpm build-renderer
      - run: pnpm build-overlay
      - run: pnpm dist --${{ matrix.arch }}

      # Upload built executables
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ github.workspace }}/release/*.${{ matrix.ext }}

      # Upload sourcemaps (only once)
      - name: Upload sourcemaps
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.arch == 'x64' }}
        uses: actions/upload-artifact@v4
        with:
          name: sourcemaps
          path: |
            ${{ github.workspace }}/dist/**/*.map
            ${{ github.workspace }}/dist/**/*.js

  publish:
    needs: [build, init_release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release
      - name: Locate release files
        id: locate
        shell: bash
        run: |
          {
            echo "macos<<EOF"
            ls ${{ github.workspace }}/release/macos-*/*
            echo EOF
            echo "ubuntu<<EOF"
            ls ${{ github.workspace }}/release/ubuntu-*/*
            echo EOF
            echo "windows=$(ls ${{ github.workspace }}/release/windows-latest-x64/*)"
            echo "sourcemaps=${{ github.workspace }}/release/sourcemaps"
          } >> "$GITHUB_OUTPUT"
      - name: Release latest main
        uses: marvinpinto/action-automatic-releases@latest
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          repo_token: '${{ secrets.GITHUB_TOKEN }}'
          automatic_release_tag: main-build
          prerelease: true
          title: Development Build
          files: |
            ${{ steps.locate.outputs.macos }}
            ${{ steps.locate.outputs.ubuntu }}
            ${{ steps.locate.outputs.windows }}
      - name: Release new version
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: '${{ secrets.GITHUB_TOKEN }}'
          prerelease: false
          files: |
            ${{ steps.locate.outputs.macos }}
            ${{ steps.locate.outputs.ubuntu }}
            ${{ steps.locate.outputs.windows }}
      - name: Finalize Sentry release
        continue-on-error: true
        env:
          SENTRY_ORG: evan-purkhiser
          SENTRY_PROJECT: prolink-tools
          SENTRY_AUTH_TOKEN: '${{ secrets.SENTRY_AUTH_TOKEN }}'
        run: |
          RELEASE="$(git describe --always)"
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli releases files "$RELEASE" upload-sourcemaps ${{ steps.locate.outputs.sourcemaps }}
          sentry-cli releases finalize "$RELEASE"
